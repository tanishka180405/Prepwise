services:
  - type: web
    name: prepwise-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prepwise-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://prepwise.vercel.app
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: prepwise-db
    plan: free
    region: oregon
